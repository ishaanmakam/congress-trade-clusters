  .cluster { border: 1px solid #e0e0e0; border-radius: 10px; margin-bottom: 10px; overflow: hidden; background: white; }

  .badge-other { background: #f0f0f0; color: #666; }
  .meta { display: flex; align-items: center; gap: 14px; font-size: 13px; color: #555; }
  .chev { transition: transform 0.15s; }
  .cluster-detail { display: none; padding: 0 16px 14px; border-top: 1px solid #eee; }
  .pol-list { font-size: 13px; color: #555; margin: 10px 0 8px; }
  table { width: 100%; font-size: 13px; border-collapse: collapse; }
  th { text-align: left; font-weight: 400; color: #777; padding: 4px 6px 4px 0; }
  td { padding: 6px 6px 6px 0; border-top: 1px solid #eee; }
  .empty { color: #777; font-size: 14px; padding: 1rem 0; }
  .file-label { font-size: 12px; color: #777; margin-top: 6px; }

let currentData = DEMO_CLUSTERS;

function renderStats(clusters) {
  const tickers = new Set(clusters.map(c => c.ticker));
  const pols = new Set();
  clusters.forEach(c => c.politicians.forEach(p => pols.add(p)));
  const sameDir = clusters.filter(c => c.same_direction).length;
  const stats = [
    { label: 'Clusters found', value: clusters.length },
    { label: 'Distinct tickers', value: tickers.size },
    { label: 'Politicians involved', value: pols.size },
    { label: 'Same-direction clusters', value: sameDir },
  ];
  document.getElementById('statGrid').innerHTML = stats.map(s =>
    `<div class="stat-card"><p class="stat-label">${s.label}</p><p class="stat-value">${s.value}</p></div>`
  ).join('');
}

function dirBadge(dir) {
  if (dir === 'buy') return '<span class="badge badge-buy">buy</span>';
  if (dir === 'sell') return '<span class="badge badge-sell">sell</span>';
  return '<span class="badge badge-other">other</span>';
}

function renderClusters(clusters) {
  const list = document.getElementById('clusterList');
  if (clusters.length === 0) {
    list.innerHTML = '<p class="empty">No clusters match your filter.</p>';
    return;
  }
  list.innerHTML = clusters.map((c, idx) => `
    <div class="cluster">
      <button class="cluster-header" data-idx="${idx}">
        <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
          <span class="ticker">${c.ticker}</span>
          <span class="asset">${c.asset}</span>
          ${c.same_direction ? '<span class="badge badge-amber">same direction</span>' : ''}
        </div>
        <div class="meta">
          <span>${c.window_start} &ndash; ${c.window_end}</span>
          <span style="font-weight:500;">${c.num_politicians} politicians</span>
          <span class="chev">&#9660;</span>
        </div>
      </button>
      <div class="cluster-detail" data-idx="${idx}">
        <p class="pol-list">${c.politicians.join(', ')}</p>
        <table>
          <thead><tr>
            <th>Politician</th><th>Date</th><th>Direction</th><th>Amount</th><th>Owner</th>
          </tr></thead>
          <tbody>
            ${c.trades.map(t => `<tr>
              <td>${t.politician}</td>
              <td>${t.date}</td>
              <td>${dirBadge(t.direction)}</td>
              <td>${t.amount}</td>
              <td style="color:#777;">${t.owner}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `).join('');

  document.querySelectorAll('.cluster-header').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = btn.getAttribute('data-idx');
      const detail = document.querySelector(`.cluster-detail[data-idx="${idx}"]`);
      const chev = btn.querySelector('.chev');
      const open = detail.style.display !== 'none' && detail.style.display !== '';
      detail.style.display = open ? 'none' : 'block';
      chev.style.transform = open ? 'rotate(0deg)' : 'rotate(180deg)';
    });
  });
}

function applyFilters() {
  const q = document.getElementById('searchBox').value.trim().toLowerCase();
  const minPol = parseInt(document.getElementById('minPolFilter').value, 10);
  let filtered = currentData.filter(c => c.num_politicians >= minPol);
  if (q) {
    filtered = filtered.filter(c =>
      c.ticker.toLowerCase().includes(q) ||
      c.asset.toLowerCase().includes(q) ||
      c.politicians.some(p => p.toLowerCase().includes(q))
    );
  }
  renderClusters(filtered);
}

document.getElementById('searchBox').addEventListener('input', applyFilters);
document.getElementById('minPolFilter').addEventListener('change', applyFilters);

document.getElementById('loadBtn').addEventListener('click', () => {
  document.getElementById('fileInput').click();
});
document.getElementById('fileInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (evt) => {
    try {
      const parsed = JSON.parse(evt.target.result);
      currentData = parsed;
      document.getElementById('dataLabel').textContent = 'Loaded: ' + file.name;
      renderStats(currentData);
      applyFilters();
    } catch (err) {
      alert('Could not parse that file as JSON: ' + err.message);
    }
  };
  reader.readAsText(file);
});

renderStats(currentData);
renderClusters(currentData);
</script>
