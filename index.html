<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Congress Trade Clusters</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg: #0d0f12;
    --bg2: #141720;
    --bg3: #1c2030;
    --border: #252a3a;
    --text: #e8eaf0;
    --muted: #6b7280;
    --accent: #f0b429;
    --buy: #34d399;
    --sell: #f87171;
    --other: #818cf8;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Inter', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* Header */
  .header {
    border-bottom: 1px solid var(--border);
    padding: 1.5rem 2rem;
    display: flex;
    align-items: baseline;
    gap: 1.5rem;
    flex-wrap: wrap;
  }
  .header-title {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .header-sub {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
  }
  .header-note {
    margin-left: auto;
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 4px;
  }

  /* Stats */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    border-bottom: 1px solid var(--border);
  }
  .stat {
    padding: 1.5rem 2rem;
    border-right: 1px solid var(--border);
  }
  .stat:last-child { border-right: none; }
  .stat-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }
  .stat-value {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 600;
    color: var(--text);
  }
  .stat-value.accent { color: var(--accent); }

  /* Filters */
  .filters {
    display: flex;
    gap: 10px;
    padding: 1rem 2rem;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
  }
  .filters input, .filters select {
    font-family: var(--mono);
    font-size: 12px;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 7px 12px;
    outline: none;
  }
  .filters input { flex: 1; }
  .filters input::placeholder { color: var(--muted); }
  .filters input:focus, .filters select:focus { border-color: var(--accent); }
  .filters select option { background: var(--bg2); }

  /* Cluster list */
  .list {
    padding: 1.5rem 2rem;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .cluster {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .cluster:hover { border-color: #3a4060; }
  .cluster.open { border-color: var(--accent); }

  .cluster-header {
    width: 100%;
    background: none;
    border: none;
    color: var(--text);
    cursor: pointer;
    display: grid;
    grid-template-columns: 70px 1fr auto auto auto;
    align-items: center;
    gap: 1rem;
    padding: 14px 16px;
    text-align: left;
  }

  .ticker-box {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  .asset-name {
    font-size: 13px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .badge-same {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: rgba(240,180,41,0.15);
    color: var(--accent);
    border: 1px solid rgba(240,180,41,0.3);
    padding: 3px 8px;
    border-radius: 3px;
    white-space: nowrap;
  }

  .date-range {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }

  .pol-count {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .chev {
    display: inline-block;
    transition: transform 0.2s;
    color: var(--muted);
    font-size: 10px;
  }
  .cluster.open .chev { transform: rotate(180deg); }

  /* Detail */
  .cluster-detail {
    display: none;
    border-top: 1px solid var(--border);
    padding: 16px;
  }
  .cluster.open .cluster-detail { display: block; }

  .pol-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 14px;
  }
  .pol-tag {
    font-family: var(--mono);
    font-size: 11px;
    background: var(--bg3);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 3px;
    color: var(--text);
  }

  .trade-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    font-family: var(--mono);
  }
  .trade-table th {
    text-align: left;
    color: var(--muted);
    font-weight: 400;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0 0 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .trade-table td {
    padding: 8px 0;
    border-bottom: 1px solid rgba(37,42,58,0.5);
    color: var(--text);
  }
  .trade-table tr:last-child td { border-bottom: none; }

  .dir-buy { color: var(--buy); }
  .dir-sell { color: var(--sell); }
  .dir-other { color: var(--other); }

  .amount-cell { color: var(--muted); }

  .empty {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--muted);
    padding: 2rem;
    text-align: center;
  }

  @media (max-width: 700px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .cluster-header { grid-template-columns: 60px 1fr auto; }
    .date-range { display: none; }
    .header { padding: 1rem; }
    .list { padding: 1rem; }
    .filters { padding: 0.75rem 1rem; }
  }
</style>
</head>
<body>

<div class="header">
  <span class="header-title">Congress Trade Clusters</span>
  <span class="header-sub">U.S. Senate · STOCK Act disclosures · 2012–2020</span>
  <span class="header-note">Same-direction = multiple senators buying or selling the same ticker within days of each other</span>
</div>

<div class="stats">
  <div class="stat">
    <div class="stat-label">Clusters found</div>
    <div class="stat-value" id="s-clusters">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">Distinct tickers</div>
    <div class="stat-value" id="s-tickers">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">Politicians involved</div>
    <div class="stat-value" id="s-pols">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">Same-direction clusters</div>
    <div class="stat-value accent" id="s-same">—</div>
  </div>
</div>

<div class="filters">
  <input type="text" id="searchBox" placeholder="Search ticker or politician..." />
  <select id="minPolFilter">
    <option value="0">All cluster sizes</option>
    <option value="3">3+ politicians</option>
    <option value="4">4+ politicians</option>
    <option value="5">5+ politicians</option>
  </select>
  <select id="dirFilter">
    <option value="all">All directions</option>
    <option value="same">Same direction only</option>
  </select>
</div>

<div class="list" id="clusterList"></div>

function renderStats(clusters) {
  const tickers = new Set(clusters.map(c => c.ticker));
  const pols = new Set();
  clusters.forEach(c => c.politicians.forEach(p => pols.add(p)));
  document.getElementById('s-clusters').textContent = clusters.length;
  document.getElementById('s-tickers').textContent = tickers.size;
  document.getElementById('s-pols').textContent = pols.size;
  document.getElementById('s-same').textContent = clusters.filter(c => c.same_direction).length;
}

function dirClass(d) {
  if (d === 'buy') return 'dir-buy';
  if (d === 'sell') return 'dir-sell';
  return 'dir-other';
}

      <button class="cluster-header" onclick="toggle(${i})">
        <span class="ticker-box">${c.ticker}</span>
        <span class="asset-name">${c.asset.replace(/&amp;/g,'&').replace(/<br>/g,' / ')}</span>
        ${c.same_direction ? '<span class="badge-same">⚡ same direction</span>' : '<span></span>'}
        <span class="date-range">${c.window_start} → ${c.window_end}</span>
        <span class="pol-count">${c.num_politicians} senators <span class="chev">▼</span></span>
      </button>
      <div class="cluster-detail">
        <div class="pol-tags">
          ${c.politicians.map(p => `<span class="pol-tag">${p}</span>`).join('')}
        </div>
        <table class="trade-table">
          <thead><tr>
            <th>Senator</th><th>Date</th><th>Direction</th><th>Amount</th><th>Owner</th>
          </tr></thead>
          <tbody>
            ${c.trades.map(t => `<tr>
              <td>${t.politician}</td>
              <td>${t.date}</td>
              <td class="${dirClass(t.direction)}">${t.direction.toUpperCase()}</td>
              <td class="amount-cell">${t.amount}</td>
              <td class="amount-cell">${t.owner}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `).join('');
}

function toggle(i) {
  const el = document.getElementById('cl-' + i);
  el.classList.toggle('open');
}

function applyFilters() {
  const q = document.getElementById('searchBox').value.trim().toLowerCase();
  const minPol = parseInt(document.getElementById('minPolFilter').value);
  const dirF = document.getElementById('dirFilter').value;

  filtered = DATA.filter(c => {
    if (c.num_politicians < minPol) return false;
    if (dirF === 'same' && !c.same_direction) return false;
    if (q && !c.ticker.toLowerCase().includes(q) &&
            !c.asset.toLowerCase().includes(q) &&
            !c.politicians.some(p => p.toLowerCase().includes(q))) return false;
    return true;
  });

  renderStats(filtered);
  renderList(filtered);
}

document.getElementById('searchBox').addEventListener('input', applyFilters);
document.getElementById('minPolFilter').addEventListener('change', applyFilters);
document.getElementById('dirFilter').addEventListener('change', applyFilters);

renderStats(DATA);
renderList(DATA);
</script>
</body>
</html>
